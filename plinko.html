<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/plinko/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  
  <link href="./_app/immutable/assets/0.DpmEpyNL.css" rel="stylesheet">
  <link href="./_app/immutable/assets/3.Di7wuimg.css" rel="stylesheet">
  
  <title>Plinko - Save Enabled</title>

  <script>
    // --- PERSISTENCE LAYER ---
    window.UGS_SAVE_KEY = "ugs_plinko_balance";
    
    // Function to get balance
    window.getSavedBalance = function() {
      return localStorage.getItem(window.UGS_SAVE_KEY) || "200.00";
    };

    // Function to save balance
    window.saveBalance = function(amount) {
      localStorage.setItem(window.UGS_SAVE_KEY, amount);
    };

    // Auto-Sync Observer: Watches the screen for balance changes and saves them
    const observer = new MutationObserver(() => {
      const balanceElement = document.querySelector('.min-w-16.text-right');
      if (balanceElement) {
        const currentVal = balanceElement.innerText.replace('$', '').trim();
        if (currentVal !== window.lastSavedVal) {
          window.saveBalance(currentVal);
          window.lastSavedVal = currentVal;
        }
      }
    });

    window.onload = () => {
      // Restore balance on load
      const balanceElement = document.querySelector('.min-w-16.text-right');
      if (balanceElement) {
        balanceElement.innerText = window.getSavedBalance();
      }
      observer.observe(document.body, { childList: true, subtree: true });
    };
  </script>
</head>

                <button class="touch-manipulation rounded-md bg-green-500 py-3 font-semibold text-slate-900 hover:bg-green-400">Drop Ball</button>

            <div class="flex-1 bg-gray-900 relative">
               <canvas id="plinko-canvas" width="760" height="570" class="mx-auto w-full"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      {
        __sveltekit_1ahsfp = { base: new URL(".", location).pathname.slice(0, -1) };

        Promise.all([
          import("./_app/immutable/entry/start.Bx-xHRpc.js"),

        ]).then(([kit, app]) => {
          kit.start(app, element, {
