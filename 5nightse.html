<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/fnae@afd4e5071add297d6169665a4f999d62f312532e/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Five Night's at BIG E</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* ── Auto-save badge ── */
      #save-status {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 9999;
        background: rgba(0,0,0,0.7);
        color: #7fff7f;
        font-size: 12px;
        font-family: sans-serif;
        padding: 4px 12px;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
        white-space: nowrap;
      }
      #save-status.visible { opacity: 1; }

      /* ── Pointer-lock overlay ── */
      #lock-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        color: #fff;
        font-size: 22px;
        font-family: sans-serif;
        align-items: center;
        justify-content: center;
        z-index: 8888;
        pointer-events: none;
      }
      #lock-overlay.visible { display: flex; }
    </style>
  </head>
  <body>

  <div id="lock-overlay">🖱️ Click the game to lock mouse</div>
  <div id="save-status">💾 Progress saved</div>

  <div id="loading-text"
    style="color:white;font-size:48px;font-family:cursive;text-align:center;margin-top:20px;">
    LOADING...
  </div>

  <div id="unity-container">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script>
/* ── Pointer Lock ── */
const canvas      = document.querySelector("#unity-canvas");
const lockOverlay = document.querySelector("#lock-overlay");

function requestLock() {
  const fn = canvas.requestPointerLock || canvas.mozRequestPointerLock || canvas.webkitRequestPointerLock;
  if (fn) fn.call(canvas);
}
function isLocked() {
  return document.pointerLockElement === canvas ||
         document.mozPointerLockElement === canvas ||
         document.webkitPointerLockElement === canvas;
}
function updateOverlay() { lockOverlay.classList.toggle("visible", !isLocked()); }

const loadingObserver = new MutationObserver(() => {
  if (!document.getElementById("loading-text")) {
    lockOverlay.classList.add("visible");
    loadingObserver.disconnect();
  }
});
loadingObserver.observe(document.body, { childList: true, subtree: true });

canvas.addEventListener("click", () => { if (!isLocked()) requestLock(); });
document.addEventListener("pointerlockchange",       updateOverlay);
document.addEventListener("mozpointerlockchange",    updateOverlay);
document.addEventListener("webkitpointerlockchange", updateOverlay);

/* ── Auto-save indicator ── */
const saveStatus = document.getElementById("save-status");
let saveTimer = null;

function flashSave() {
  saveStatus.classList.add("visible");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveStatus.classList.remove("visible"), 2000);
}

// Intercept localStorage writes — Unity uses these for all PlayerPrefs
const _setItem = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value) {
  _setItem(key, value);
  flashSave();
};

/* ── Unity Loader ── */
var loadingText = document.querySelector("#loading-text");
let loadedBytes = 0;

async function fetchWithProgress(url) {
  const response = await fetch(url);
  const reader = response.body.getReader();
  let chunks = [], received = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    received += value.length;
    loadedBytes += value.length;
    chunks.push(value);
    loadingText.textContent = `LOADING... ${(loadedBytes / (1024 * 1024)).toFixed(2)} MB / 139.53 MB`;
  }
  const fullBuffer = new Uint8Array(received);
  let offset = 0;
  for (const chunk of chunks) { fullBuffer.set(chunk, offset); offset += chunk.length; }
  return fullBuffer.buffer;
}

async function mergeFiles(fileParts) {
  const buffers = await Promise.all(fileParts.map(p => fetchWithProgress(p)));
  return URL.createObjectURL(new Blob(buffers));
}

function getParts(file, start, end) {
  const parts = [];
  for (let i = start; i <= end; i++) parts.push(`${file}.part${i}`);
  return parts;
}

(async () => {
  const [dataUrl, wasmUrl, webm] = await Promise.all([
    mergeFiles(getParts("Build/fnae.data", 1, 3)),
    mergeFiles(getParts("Build/fnae.wasm", 1, 2)),
    mergeFiles(getParts("StreamingAssets/202512191935.webm", 1, 3)),
  ]);

  window.randomwebm = webm;
  const realSrc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, "src");
  Object.defineProperty(HTMLMediaElement.prototype, "src", {
    set(value) {
      if (typeof value === "string" && value.includes("202512191935.mp4")) value = window.randomwebm;
      return realSrc.set.call(this, value);
    },
    get() { return realSrc.get.call(this); }
  });

  const loadingBar      = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");

  const config = {
    arguments: [],
    dataUrl,
    frameworkUrl:       "Build/fnae.framework.js",
    codeUrl:            wasmUrl,
    streamingAssetsUrl: "StreamingAssets",
    companyName:        "DefaultCompany",
    productName:        "fnae",
    productVersion:     "1.0",
    showBanner:         () => {},
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    const meta = document.createElement("meta");
    meta.name = "viewport";
    meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
    document.head.appendChild(meta);
  }

  loadingBar.style.display = "block";
  const script = document.createElement("script");
  script.src = "Build/fnae.loader.js";
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = 100 * progress + "%";
    }).then(() => {
      loadingBar.style.display = "none";
      loadingText.remove();
    }).catch(alert);
  };
  document.body.appendChild(script);
})();
  </script>
  </body>
</html>
