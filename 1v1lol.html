<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1v1.lol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #save-status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: #7fff7f;
      font-size: 12px;
      font-family: sans-serif;
      padding: 4px 12px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      white-space: nowrap;
    }
    #save-status.visible { opacity: 1; }

    #lock-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 12px;
      font-family: sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    #lock-btn:hover { background: #2a2a4e; }
    #lock-btn.locked { background: #2a4e2a; border-color: #4caf50; color: #7fff7f; }
  </style>
</head>
<body>

  <button id="lock-btn">Lock Mouse</button>
  <div id="save-status">Progress saved</div>

  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/2.7.js"></script>
  <script>
    var gameInstance;
    window.onload = function() {
      gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/n-101-1/1@main/2.7.json", {
        onProgress: UnityProgress,
        Module: {
          onRuntimeInitialized: function() {
            UnityProgress(gameInstance, "complete");
          }
        }
      });
    };
  </script>

  <div class="webgl-content">
    <div id="gameContainer" style="width:100%;height:100vh;margin:0;padding:0;border:0;position:relative;background:#000;">
      <canvas id="#canvas" style="width:100%;height:100%;cursor:default;" width="1018" height="926"></canvas>
      <div class="logo Dark" style="display:none;"></div>
      <div class="progress Dark" style="display:none;">
        <div class="empty" style="width:0%;"></div>
        <div class="full" style="width:100%;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-app.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1login.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firestore.js"></script>

  <script>
    initializeFireBase();

    function showAds() { console.log("show ads"); }
    function requestNewAd() { unityAdFinishedCallback(); }
    function unityAdFinishedCallback() {
      try { if (gameInstance) gameInstance.SendMessage("AdsManager", "OnWebCallback"); }
      catch (error) { console.log(error); }
    }

    /* ── Mouse Lock ── */
    const canvas = document.querySelector("#\\#canvas");
    const lockBtn = document.getElementById("lock-btn");

    function requestLock() {
      const fn = canvas.requestPointerLock || canvas.mozRequestPointerLock || canvas.webkitRequestPointerLock;
      if (fn) fn.call(canvas);
    }
    function exitLock() {
      const fn = document.exitPointerLock || document.mozExitPointerLock || document.webkitExitPointerLock;
      if (fn) fn.call(document);
    }
    function isLocked() {
      return document.pointerLockElement === canvas ||
             document.mozPointerLockElement === canvas ||
             document.webkitPointerLockElement === canvas;
    }
    function updateBtn() {
      if (isLocked()) { lockBtn.textContent = "Unlock Mouse"; lockBtn.classList.add("locked"); }
      else { lockBtn.textContent = "Lock Mouse"; lockBtn.classList.remove("locked"); }
    }

    lockBtn.addEventListener("click", () => { if (isLocked()) exitLock(); else requestLock(); });
    document.addEventListener("keydown", e => { if (e.code === "KeyL") { if (isLocked()) exitLock(); else requestLock(); } });
    document.addEventListener("pointerlockchange", updateBtn);
    document.addEventListener("mozpointerlockchange", updateBtn);
    document.addEventListener("webkitpointerlockchange", updateBtn);

    /* ── Auto-save ── */
    const saveStatus = document.getElementById("save-status");
    let saveTimer = null;
    function flashSave() {
      saveStatus.classList.add("visible");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveStatus.classList.remove("visible"), 2000);
    }
    const _setItem = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(key, value) {
      _setItem(key, value);
      flashSave();
    };
  </script>
</body>
</html>
