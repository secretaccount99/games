async function fetchAndCombineZip(binUrls) {
  const responses = await Promise.all(binUrls.map(url => fetch(url)));
  const buffers = await Promise.all(responses.map(res => res.arrayBuffer()));
  let totalLength = buffers.reduce((acc, buf) => acc + buf.byteLength, 0);
  let combined = new Uint8Array(totalLength);
  let offset = 0;
  for (let buf of buffers) { combined.set(new Uint8Array(buf), offset); offset += buf.byteLength; }
  return combined;
}

async function unzipWebpFromExternalBins(binUrls) {

    if (!file.dir) {

      if (filename.endsWith('.js') || filename.endsWith('.mjs')) mime = 'text/javascript';
      else if (filename.endsWith('.css')) mime = 'text/css';
      else if (filename.endsWith('.html')) mime = 'text/html';
      else if (filename.includes('250100c98afece1d27bb09b3a3d618ca')) mime = 'application/wasm';
      else if (filename.includes('ed690d1402dd39fcf7abb15b99effdea')) mime = 'application/javascript';
      else if (filename.endsWith('.png')) mime = 'image/png';
      else if (filename.endsWith('.jpg') || filename.endsWith('.jpeg')) mime = 'image/jpeg';
      else if (filename.endsWith('.wasm')) mime = 'application/wasm';
      else if (filename.endsWith('.data.unityweb')) mime = 'application/octet-stream';
      else if (filename.endsWith('.asm.code.unityweb')) mime = 'application/javascript';
      else if (filename.endsWith('.asm.memory.unityweb')) mime = 'application/octet-stream';
      else if (filename.endsWith('.asm.framework.unityweb')) mime = 'application/javascript';
      if (filename.endsWith('.asm.framework.unityweb')) mime = 'application/javascript';
      if (filename.endsWith('.asm.code.unityweb')) mime = 'application/javascript';
      if (filename.endsWith('.asm.memory.unityweb')) mime = 'application/octet-stream';
      const rawBlob = await file.async("blob");
      const blob = mime ? new Blob([rawBlob], { type: mime }) : rawBlob;
      blobUrls[filename] = URL.createObjectURL(blob);
    }
  }
  return blobUrls;
}
