<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visit Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .widget {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 200px;
    }

    .widget-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 0.5px 1fr;
      gap: 10px;
      align-items: center;
    }

    .stat { text-align: center; }

    .divider {
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-number.loading {
      color: rgba(255,255,255,0.2);
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 5px;
    }

    .last-updated {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-title">
      <div class="pulse-dot"></div>
      Live visits
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number loading" id="total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-number loading" id="today">—</div>
        <div class="stat-label">Today</div>
      </div>
    </div>

    <div class="last-updated" id="last-updated">Loading...</div>
  </div>

  <script>
    const DOMAIN = "sites.google.com";
    const PAGE   = "/ausdk12.org/classrooms/";

    function animateCount(el, target) {
      el.classList.remove("loading");
      const start = performance.now();
      const duration = 700;
      function step(now) {
        const p = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(target * eased).toLocaleString();
        if (p < 1) requestAnimationFrame(step);
        else el.textContent = target.toLocaleString();
      }
      requestAnimationFrame(step);
    }

    function timeStr() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function init() {
      try {
        const res = await fetch("https://visitor.6developer.com/visit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            domain: DOMAIN,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            page_path: PAGE,
            page_title: "Classrooms Games Site"
          })
        });
        const data = await res.json();

        animateCount(document.getElementById("total"), data.totalCount);
        animateCount(document.getElementById("today"), data.todayCount);
        document.getElementById("last-updated").textContent = `Updated ${timeStr()}`;

        // Refresh every 30s without counting extra hits
        setInterval(async () => {
          try {
            const r = await fetch(`https://visitor.6developer.com/visit?domain=${DOMAIN}`);
            const d = await r.json();
            document.getElementById("total").textContent = d.totalCount.toLocaleString();
            document.getElementById("today").textContent = d.todayCount.toLocaleString();
            document.getElementById("last-updated").textContent = `Updated ${timeStr()}`;
          } catch (_) {}
        }, 30000);

      } catch (_) {
        ["total", "today"].forEach(id => {
          const el = document.getElementById(id);
          el.textContent = "—";
          el.classList.remove("loading");
        });
        document.getElementById("last-updated").textContent = "Could not load stats";
      }
    }

    init();
  </script>
</body>
</html>
