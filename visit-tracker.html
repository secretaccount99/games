<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Visit Tracker</title>
  <style>
    /* Keeping your original sleek styling */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    .widget {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px); /* Added blur for better look */
      border-radius: 14px;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 220px;
    }

    .widget.glow {
      animation: glow-fade 1.4s ease forwards;
    }

    @keyframes glow-fade {
      0% { border-color: rgba(255,255,255,0.9); box-shadow: 0 0 14px 3px rgba(255,255,255,0.3); }
      100% { border-color: rgba(255,255,255,0.18); box-shadow: none; }
    }

    .widget-title { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 7px; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .stats { display: grid; grid-template-columns: 1fr 0.5px 1fr; gap: 10px; align-items: center; }
    .stat { text-align: center; }
    .divider { background: rgba(255,255,255,0.12); height: 30px; }
    .stat-number { font-size: 28px; font-weight: 700; color: #ffffff; font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-top: 5px; }
    .last-updated { font-size: 10px; color: rgba(255,255,255,0.25); text-align: center; }
  </style>
</head>
<body>

  <div class="widget" id="widget">
    <div class="widget-title"><div class="pulse-dot"></div>Live Network</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-number" id="total">...</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-number" id="session">...</div>
        <div class="stat-label">Session</div>
      </div>
    </div>
    <div class="last-updated" id="status">Syncing...</div>
  </div>

  <script>
    // Replace 'secret_games_site' with a unique name for your site
    const NAMESPACE = "secretaccount99_games_v1";
    const KEY = "visits";
    const widget = document.getElementById("widget");

    function timeStr() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function triggerGlow() {
      widget.classList.remove("glow");
      void widget.offsetWidth;
      widget.classList.add("glow");
    }

    // This session counter resets if they close the tab, 
    // but the TOTAL counter stays forever.
    let sessionVisits = parseInt(sessionStorage.getItem('s_count')) || 0;
    sessionVisits++;
    sessionStorage.setItem('s_count', sessionVisits);
    document.getElementById("session").textContent = sessionVisits;

    async function updateStats() {
      try {
        // This increments the count by 1 every time the page loads
        const response = await fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}`);
        const data = await response.json();
        
        document.getElementById("total").textContent = data.value.toLocaleString();
        document.getElementById("status").textContent = `Updated ${timeStr()}`;
        triggerGlow();
      } catch (err) {
        document.getElementById("total").textContent = "Error";
        document.getElementById("status").textContent = "API Offline";
        console.error("CountAPI Error:", err);
      }
    }

    // Run on load
    updateStats();

    // Refresh display every 60 seconds without adding extra "hits"
    setInterval(async () => {
      try {
        const response = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/${KEY}`);
        const data = await response.json();
        document.getElementById("total").textContent = data.value.toLocaleString();
      } catch (e) {}
    }, 60000);
  </script>
</body>
</html>
