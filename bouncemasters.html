<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/bouncemasters/">
  <title>Bouncemasters</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-touch-fullscreen" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="msapplication-tap-highlight" content="no"/>
  <meta name="MobileOptimized" content="960"/>
  <meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, initial-scale=1.0, user-scalable=no, minimal-ui"/>
  <meta charset="utf-8"/>
  <link rel="stylesheet" type="text/css" href="style/index.css">
  <script src="https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/ytgame.js"></script>
  <script src="game.js"></script>
  <script>window.addEventListener("load", () => window.runGame());</script>
  <style>
    #save-status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: #7fff7f;
      font-size: 12px;
      font-family: sans-serif;
      padding: 4px 12px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      white-space: nowrap;
    }
    #save-status.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="save-status">Progress saved</div>
  <script>
    const saveStatus = document.getElementById("save-status");
    let saveTimer = null;
    function flashSave() {
      saveStatus.classList.add("visible");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveStatus.classList.remove("visible"), 2000);
    }
    const _setItem = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(key, value) {
      _setItem(key, value);
      flashSave();
    };
  </script>
</body>
</html>
