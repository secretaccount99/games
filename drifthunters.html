<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/drift-hunters/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; background-color: #1a1a1a; font-family: sans-serif;
      }
      #gameContainer { width: 100vw; height: 100vh; z-index: 1; }
      canvas { width: 100% !important; height: 100% !important; }

      /* --- NEW CLEAN LOADING OVERLAY --- */
      #custom-loader {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #1a1a1a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }
      .loader-title {
        color: #ffffff;
        font-size: 24px;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      #progress-container {
        width: 250px;
        height: 10px;
        background: #333;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #444;
      }
      #progress-fill {
        width: 0%;
        height: 100%;
        background: #4CAF50; /* Clean Green bar */
        transition: width 0.3s ease;
      }
    </style>
  </head>
  <body>
    
    <div id="custom-loader">
      <div class="loader-title">LOADING ASSETS...</div>
      <div id="progress-container">
        <div id="progress-fill"></div>
      </div>
    </div>

    <div id="gameContainer"></div>

    <script src="UnityLoader2019.js"></script>
    <script>
      const fill = document.getElementById("progress-fill");
      const loader = document.getElementById("custom-loader");

      // 1. INSTANTIATE WITH CUSTOM PROGRESS
      var gameInstance = UnityLoader.instantiate("gameContainer", "dh.json", {
        onProgress: function(instance, progress) {
          // Update our custom bar
          fill.style.width = (progress * 100) + "%";
          
          // When finished, hide the overlay
          if (progress >= 1) {
            setTimeout(() => {
                loader.style.display = "none";
            }, 500);
          }
        }
      });

      // 2. PANIC BUTTON (-)
      document.addEventListener('keydown', function(e) {
        if (e.key === '-') {
          window.location.href = "https://classroom.google.com";
        }
      });

      console.log("Drift Hunters: Custom Loader Active. Mouse Lock Disabled.");
    </script>
  </body>
</html>
