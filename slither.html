<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
  <title>Slither.io</title>
  <meta content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no" name="viewport">
  <meta content="true" name="HandheldFriendly">
  <meta content="yes" name="mobile-web-app-capable">
  <style>
    * { padding: 0; margin: 0; }
    html, body {
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: none;
      -ms-touch-action: none;
    }
    canvas {
      touch-action-delay: none;
      touch-action: none;
      -ms-touch-action: none;
    }
    @font-face {
      font-family: Oswald Regular;
      src: url(https://26515722-282596139816136697.preview.editmysite.com/uploads/b/7547235-562404422326578714/files/oswald_regular.ttf);
    }
    html, body, canvas { touch-action: none; touch-action-delay: none; }

    #save-status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: #7fff7f;
      font-size: 12px;
      font-family: sans-serif;
      padding: 4px 12px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      white-space: nowrap;
    }
    #save-status.visible { opacity: 1; }

    #button { display: none; }
    .imgb_vis { animation: imgb-animation 7s linear; }
    @keyframes imgb-animation {
      10%  { transform: translateX(0); }
      20%  { transform: translateX(100px); }
      90%  { transform: translateX(100px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body dir="ltr" style="cursor: auto;">
  <div id="fb-root"></div>

  <script>
    function On_GameLoaded() { isGameLoaded = true; }
    function Show_Ads() { c2_callFunction("On_GameResumed"); showad1(); }
    (function() {
      if (window.location.protocol.substr(0, 4) === "file") {
        alert("Exported games won't work until you upload them.");
      }
    })();
  </script>

  <div id="c2canvasdiv" style="width:1262px;height:928px;margin-left:0px;margin-top:0px;">
    <canvas height="928" id="c2canvas" width="1262" style="width:1262px;height:928px;">
      <h1>Your browser does not appear to support HTML5. Try upgrading your browser to the latest version.</h1>
    </canvas>
    <input type="text" autocomplete="off" placeholder="Your Name Here" spellcheck="false"
      style="position:absolute;top:432px;left:436px;width:373px;height:35px;border:none;background-color:rgba(0,0,0,0);color:rgb(255,255,255);font-size:20px;font-family:Oswald;padding:10px;border-radius:100px;">
  </div>

  <div id="save-status">Progress saved</div>

  <script src="https://26515722-282596139816136697.preview.editmysite.com/uploads/b/7547235-562404422326578714/files/offlineClient.js"></script>
  <script src="https://26515722-282596139816136697.preview.editmysite.com/uploads/b/7547235-562404422326578714/files/jquery-2.1.1.min.js"></script>
  <script src="https://26515722-282596139816136697.preview.editmysite.com/uploads/b/7547235-562404422326578714/files/c2runtime.js"></script>

  <script>
    jQuery(document).ready(function() { cr_createRuntime("c2canvas"); });

    function onVisibilityChanged() {
      if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
        cr_setSuspended(true);
      else
        cr_setSuspended(false);
    }

    document.addEventListener("visibilitychange",       onVisibilityChanged, false);
    document.addEventListener("mozvisibilitychange",    onVisibilityChanged, false);
    document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
    document.addEventListener("msvisibilitychange",     onVisibilityChanged, false);

    function OnRegisterSWError(e) { console.warn("Failed to register service worker: ", e); }

    window.C2_RegisterSW = function C2_RegisterSW() {
      if (!navigator.serviceWorker) return;
      try {
        navigator.serviceWorker.register("sw.js", { scope: "./" })
          .then(reg => console.log("Registered service worker on " + reg.scope))
          .catch(OnRegisterSWError);
      } catch(e) { OnRegisterSWError(e); }
    };

    // Auto-save indicator
    const saveStatus = document.getElementById("save-status");
    let saveTimer = null;

    function flashSave() {
      saveStatus.classList.add("visible");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveStatus.classList.remove("visible"), 2000);
    }

    const _setItem = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(key, value) {
      _setItem(key, value);
      flashSave();
    };
  </script>
</body>
</html>
